name: upower
version: 0.99.17
summary: An abstraction for power devices
description: |
    UPower is an abstraction for enumerating power devices, listening
    to device events and querying history and statistics.
confinement: strict
base: core22

slots:
  upower-dbus:
    interface: dbus
    bus: system
    name: org.freedesktop.UPower

  upower:
    interface: upower-observe

plugs:
  upower-client:
    interface: upower-observe

apps:
  upowerd:
    command: usr/libexec/upowerd
    daemon: dbus
    daemon-scope: system
    activates-on:
      - upower-dbus
    slots:
      - upower
    plugs:
      - hardware-observe
      - bluez

  upower:
    command: usr/bin/upower
    plugs:
      - upower-client

layout:
  /etc/UPower:
    bind: $SNAP/etc/UPower

parts:
  meson-deps:
    plugin: python
    source: https://github.com/mesonbuild/meson/releases/download/0.63.0/meson-0.63.0.tar.gz
    build-packages:
      - ninja-build
      - python3-distutils-extra
    prime:
      - -bin
      - -etc
      - -lib
      - -share
      - -usr

  upower-copyright:
    plugin: nil
    stage-packages:
      - upower
      - libupower-glib3
    override-build: |
      cp -r "${CRAFT_PART_INSTALL}/usr/share/doc" doc
      rm -rf "${CRAFT_PART_INSTALL}"
      install -Dm644 -t "${CRAFT_PART_INSTALL}/usr/share/doc/libupower-glib3" doc/libupower-glib3/copyright doc/libupower-glib3/changelog.*
      install -Dm644 -t "${CRAFT_PART_INSTALL}/usr/share/doc/upower" doc/upower/copyright doc/upower/changelog.*

  upower:
    after:
      - meson-deps
    build-packages:
    - libglib2.0-dev
    - xsltproc
    - libgudev-1.0-dev
    - gtk-doc-tools
    stage-packages:
    - libgudev-1.0-0
    plugin: meson
    meson-parameters:
      - --prefix=/usr
    source-type: git
    source-branch: applied/ubuntu/jammy
    source: https://git.launchpad.net/ubuntu/+source/upower
